<!doctype html>
<html lang="pt-AO">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Gracefully handle sandboxed environments where window.fetch cannot be written to
      try {
        let originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return originalFetch;
          },
          set(val) {
            originalFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not redefine window.fetch setter, sandboxed browser wrapper active.", e);
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KwanzaTrade - Sistema de Trading de Angola</title>
    <!-- Google Fonts -->

  </head>

  </body>
</html>
